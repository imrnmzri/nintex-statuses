name: Deploy Pages
on:
  workflow_run:
    workflows: ["Fetch Nintex Uptime"]
    types:
      - completed
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build site bundle
        run: |
          mkdir -p public
          cp -R site/* public/
          mkdir -p public/data
          cp data/nintex-uptime.json public/data/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - uses: actions/deploy-pages@v4
        id: deployment
